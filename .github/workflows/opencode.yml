name: OpenCode Agent
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  opencode-run:
    if: |
      contains(github.event.issue.body, '/opencode') || 
      contains(github.event.comment.body, '/opencode') ||
      contains(github.event.issue.body, '/oc') || 
      contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    
    # Añadimos permisos explícitos para el entorno de GitHub
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.OPENCODE_GITHUB_TOKEN }}

      - name: Run OpenCode Agent
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Usamos tu token personalizado mapeado como GITHUB_TOKEN estándar de la acción
          GITHUB_TOKEN: ${{ secrets.OPENCODE_GITHUB_TOKEN }}
        with:
          model: anthropic/claude-3-7-sonnet
          # Le pasamos explícitamente el token también en los parámetros de la acción
          token: ${{ secrets.OPENCODE_GITHUB_TOKEN }}