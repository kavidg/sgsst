name: OpenCode Agent
on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  opencode-run:
    if: |
      contains(github.event.issue.body, '/opencode') || 
      contains(github.event.comment.body, '/opencode') ||
      contains(github.event.issue.body, '/oc') || 
      contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode Agent
        # Apuntamos directamente al hash del commit de la acción para forzar la descarga sin errores de versión
        uses: anomalyco/opencode/github@9db7459178225fc9e5910fa789bcfe0bd4eb4305
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-3-7-sonnet